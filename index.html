<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoリスト</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ToDoリスト" />
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <div id="installBanner" class="install-banner" hidden>
    <span class="install-banner-text">
      共有ボタン
      <svg class="install-banner-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M12 2l4 4h-3v9h-2V6H8l4-4zM5 11h2v9h10v-9h2v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-9z"/>
      </svg>
      をタップ →「ホーム画面に追加」でアプリ化できます
    </span>
    <button id="installBannerClose" type="button" class="install-banner-close" aria-label="閉じる">×</button>
  </div>
  <main class="app-shell">
    <div class="dust" aria-hidden="true">
      <span class="mote mote-1"></span>
      <span class="mote mote-2"></span>
      <span class="mote mote-3"></span>
      <span class="mote mote-4"></span>
      <span class="mote mote-5"></span>
    </div>
    <h1>ToDoリスト</h1>
    <button id="enableNotifyButton" type="button" class="enable-notify-button">通知を有効にする</button>
    <section class="todo-panel">
      <div class="library-entry">
        <span class="drawer-handle" aria-hidden="true"></span>
        <div class="library-shelf" aria-hidden="true">
          <span class="shelf-board"></span>
          <span class="book book-1"></span>
          <span class="book book-2"></span>
          <span class="book book-3"></span>
          <span class="book book-4"></span>
          <span class="book book-5"></span>
          <span class="book book-6"></span>
        </div>
        <div class="input-group">
          <input id="todoInput" type="text" placeholder="やることを入力してください" />
          <div class="due-field">
            <input id="dueInput" type="datetime-local" placeholder="時間を入力してください" aria-label="期限日時" />
            <span class="due-field-placeholder" aria-hidden="true">時間を入力してください</span>
          </div>
          <select id="notifyInput" aria-label="通知タイミング">
            <option value="1h" selected>1時間前に通知</option>
            <option value="2h">2時間前に通知</option>
            <option value="3h">3時間前に通知</option>
            <option value="1d">1日前に通知</option>
            <option value="daily">毎日通知</option>
          </select>
          <button id="addButton">追加</button>
        </div>
      </div>
      <ul id="todoList" class="todo-list"></ul>
    </section>
  </main>
  <script src="script.js?v=4"></script>
</body>
</html>
